<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tours — PDG Revit Tools</title>
<style>
  :root {
    --bg: #1a1d23;
    --surface: #22262f;
    --surface-hover: #2a2f3a;
    --border: #333844;
    --accent: #0696d7;
    --accent-dim: #0696d720;
    --text: #e8eaf0;
    --text-muted: #8892a4;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  header {
    background: linear-gradient(135deg, #0d1117 0%, #1a2535 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 28px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 26px; height: 26px; }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .breadcrumbs {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 13px;
  }

  .breadcrumbs a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.15s;
  }

  .breadcrumbs a:hover { color: var(--accent); }
  .breadcrumbs span { color: var(--text-muted); opacity: 0.5; }

  main {
    padding: 32px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .tour-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  .tour-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text);
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }

  .tour-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: var(--shadow);
  }

  .tour-thumb {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: linear-gradient(135deg, var(--accent-dim), var(--surface-hover));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tour-thumb svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 40px;
    color: var(--accent);
    opacity: 0.85;
  }

  .tour-body {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .tour-name {
    font-size: 15px;
    font-weight: 600;
  }

  .tour-arrow {
    color: var(--text-muted);
    flex-shrink: 0;
  }

  @media (max-width: 700px) {
    header { padding: 20px; }
    main { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div>
      <h1>PDG <span>Revit Tools</span></h1>
      <div class="subtitle">3D Tours</div>
    </div>
  </div>
  <div class="breadcrumbs">
    <a href="../index.html">Command Reference</a>
    <span>/</span>
    <span style="color: var(--text);">3D Tours</span>
  </div>
</header>

          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>

        </svg>
      </div>

    </a>

    <a class="tour-card" href="tour-2.html">

          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>

          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="tour-body">
        <span class="tour-name">Tour 4</span>
        <span class="tour-arrow">&rarr;</span>
      </div>
    </a>

  </div>
</main>

</body>
