<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal 108 — PDG Revit Tools</title>
<style>
  :root {
    --bg: #1a1d23;
    --surface: #22262f;
    --border: #333844;
    --accent: #0696d7;
    --text: #e8eaf0;
    --text-muted: #8892a4;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  header {
    background: linear-gradient(135deg, #0d1117 0%, #1a2535 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 28px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 26px; height: 26px; }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .breadcrumbs {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 13px;
  }

  .breadcrumbs a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.15s;
  }

  .breadcrumbs a:hover { color: var(--accent); }
  .breadcrumbs span { color: var(--text-muted); opacity: 0.5; }

  main {
    padding: 32px 40px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .tour-frame {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .tour-embed {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    border-radius: 6px;
    overflow: hidden;
  }

  .tour-embed iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  @media (max-width: 700px) {
    header { padding: 20px; }
    main { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div>
      <h1>PDG <span>Revit Tools</span></h1>
      <div class="subtitle">Canal 108</div>
    </div>
  </div>
  <div class="breadcrumbs">
    <a href="../index.html">Command Reference</a>
    <span>/</span>
    <a href="index.html">3D Tours</a>
    <span>/</span>
    <span style="color: var(--text);">Canal 108</span>
  </div>
</header>

<main>
  <div class="tour-frame">
    <div class="tour-embed">
      <iframe src="https://my.matterport.com/show/?m=FWmdLXi5twg" allowfullscreen allow="autoplay; fullscreen; web-share; xr-spatial-tracking;"></iframe>
    </div>
  </div>
</main>

</body>
</html>
